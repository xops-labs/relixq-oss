name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go scanner tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/go/go.mod
          cache-dependency-path: packages/go/go.sum

      - name: go test
        working-directory: packages/go
        env:
          # Match released CLI/scanner artifacts, which are built CGO-off.
          CGO_ENABLED: '0'
        run: go test ./...

  dotnet:
    name: .NET API build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore apps/api/RelixQ.OssApi.csproj

      - name: Build
        run: dotnet build apps/api/RelixQ.OssApi.csproj --configuration Release --no-restore

  web:
    name: TypeScript packages and web build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Build npm packages
        run: npm run build:packages

      - name: Build web app
        run: npm run build:web
