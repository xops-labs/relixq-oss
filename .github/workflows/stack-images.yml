# Build and publish the self-hosted web-app stack images (API + web UI) to
# GHCR, so beta users can `docker compose up` the dashboard without checking
# out the source. The slim scanner image is published separately
# (relixq-image.yml / release.yml). Runs on demand and on every push to main
# that touches the app or its packages; release tags also get the version tag.
name: Publish stack images

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
    paths:
      - 'apps/**'
      - 'packages/**'
      - '.github/workflows/stack-images.yml'

permissions:
  contents: read
  packages: write

jobs:
  images:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: relixq-api
            dockerfile: apps/api/Dockerfile
          - name: relixq-web
            dockerfile: apps/web/Dockerfile
    steps:
      - uses: actions/checkout@v7

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=beta
            type=semver,pattern={{version}}
            type=sha,format=short

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
