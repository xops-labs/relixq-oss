name: Feature request
description: Suggest a capability, rule, detector, workflow, or documentation improvement.
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user pain or gap does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should Relix-Q do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI scanner
        - GitHub Action
        - Web UI
        - API
        - Dependency scan
        - TLS scan
        - Rule pack / detector
        - Packaging / release
        - Documentation
        - Governance
        - Other
  - type: textarea
    id: evidence
    attributes:
      label: Evidence or examples
      description: Standards references, sample code, sanitized findings, screenshots, or related tools.
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This does not require bundling external rule-pack overlay content.
        - label: This does not require sending source code or findings to any external service.
