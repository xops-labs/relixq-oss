# Intentionally vulnerable sample — DO NOT USE.
server {
    listen 443 ssl;
    server_name demo.local;

    # Obsolete TLS versions and a weak cipher.
    ssl_protocols TLSv1 TLSv1.1;
    ssl_ciphers RC4-MD5:DES-CBC3-SHA;
    ssl_prefer_server_ciphers on;

    ssl_certificate     /etc/nginx/demo.crt;
    ssl_certificate_key /etc/nginx/demo.key;
}
