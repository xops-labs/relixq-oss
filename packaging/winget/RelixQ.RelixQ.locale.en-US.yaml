ShortDescription: Scan code for quantum-vulnerable cryptography and report post-quantum readiness.
Description: >-
  Relix-Q is an open-source scanner for quantum-vulnerable cryptography. It
  inventories weak and quantum-broken crypto across source code, dependencies,
  TLS endpoints, and certificates, scores the risk, and exports findings as
  JSON, SARIF, Markdown, or HTML for CI gating. This package is the command-line
  scanner; the self-hosted web dashboard runs via Docker.
