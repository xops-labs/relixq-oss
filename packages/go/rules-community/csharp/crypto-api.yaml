# Grover-tier symmetric: 3DES retains ~112-bit classical / ~57-bit quantum
# effective strength and is SWEET32-weak; .NET marks it obsolete.
- id: CSHARP_3DES
  language: csharp
  category: weak-cipher
  severity: medium
  algorithm: "3DES"
  usage_type: "encryption"
  quantum_safety: grover_weakened
  detector:
    type: regex
    pattern: '\b(TripleDES\.Create\s*\(|new\s+TripleDES(CryptoServiceProvider|Cng)\b)'
  message: "TripleDES detected - 3DES is deprecated (SWEET32) and further weakened by Grover's algorithm."
  recommendation: "Replace with AES-256-GCM (AesGcm or Aes.Create with KeySize = 256)."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'using var tdes = TripleDES.Create();'
    no_match:
      - 'using var aes = Aes.Create();'
