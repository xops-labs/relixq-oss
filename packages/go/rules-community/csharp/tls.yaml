- id: CSHARP_TLS_OLD_VERSION
  language: csharp
  category: weak-tls
  severity: high
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: '\bSslProtocols\.(Ssl3|Tls|Tls11)\b'
  message: "Deprecated TLS protocol enabled. SSLv3/TLS1.0/TLS1.1 are insecure."
  recommendation: "Restrict to TLS 1.2+ and prefer TLS 1.3."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'options.SslProtocols = SslProtocols.Tls11;'
    no_match:
      - 'options.SslProtocols = SslProtocols.Tls12;'
- id: CSHARP_RC4
  language: csharp
  category: weak-cipher
  severity: critical
  algorithm: RC4
  usage_type: encryption
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: '\bRC4\b'
    flags: i
  message: "RC4 stream cipher detected; broken since 2013."
  recommendation: "Use AES-GCM or ChaCha20-Poly1305."
  cwe: [327]
  confidence: 0.7
  examples:
    match:
      - 'var algorithm = "RC4";'
    no_match:
      - 'int crc4 = ComputeCrc4(frame);'
- id: CSHARP_AES_ECB
  language: csharp
  category: weak-cipher
  severity: high
  algorithm: AES
  usage_type: encryption
  quantum_safety: hybrid
  detector:
    type: ast
    query: "memberref:CipherMode.ECB"
  message: "AES in ECB mode leaks plaintext patterns and is unsafe for confidentiality."
  recommendation: "Use AES-GCM or AES-GCM-SIV; ECB is acceptable only for single-block raw operations."
  cwe: [327]
  confidence: 0.97
