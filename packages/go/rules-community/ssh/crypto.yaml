  detector:
    type: regex
    pattern: '^\s*Ciphers\b[^#]*\b3des-cbc\b'
    flags: i
  message: "sshd Ciphers allows 3des-cbc - 3DES is deprecated (SWEET32) and further weakened by Grover's algorithm."
  recommendation: "Replace with AES-256-GCM (aes256-gcm@openssh.com)."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'Ciphers 3des-cbc,aes256-ctr'
    no_match:
      - 'Ciphers chacha20-poly1305@openssh.com,aes256-ctr'
- id: SSH_ALLOWED_KEYTYPES_RSA
  language: ssh-config
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: RSA
  usage_type: signing
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: '^\s*(HostKeyAlgorithms|PubkeyAcceptedKeyTypes|PubkeyAcceptedAlgorithms)\b[^#]*\b(ssh-rsa|rsa-sha2-256|rsa-sha2-512)\b'
    flags: i
  message: "SSH algorithm allowlist accepts RSA key types (ssh-rsa/rsa-sha2-*) - RSA authentication is quantum-vulnerable (Shor's algorithm)."
  recommendation: "Inventory for migration to ML-DSA (FIPS 204) keys as OpenSSH support lands; drop ssh-rsa (SHA-1) immediately."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'HostKeyAlgorithms ssh-rsa,ssh-ed25519'
    no_match:
      - 'HostKeyAlgorithms ssh-ed25519,sk-ssh-ed25519@openssh.com'
