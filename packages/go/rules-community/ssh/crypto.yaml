# OpenSSH configuration rules
#
# The scanner routes the conventional file names sshd_config / ssh_config to
# language "ssh-config" (scanner/language.go), so these rules never fire on
# arbitrary text. Directives are matched case-insensitively (sshd_config
# keywords are case-insensitive) and only when uncommented (`^\s*Directive`),
# so the commented-out defaults that ship in stock sshd_config files do not
# flood the inventory.
#
# PQC posture: every classical SSH host-key and key-exchange algorithm is
# Shor-broken. OpenSSH ships PQC hybrids for kex (sntrup761x25519-sha512,
# mlkem768x25519-sha256 in 9.9+); host-key signatures await ML-DSA support.
- id: SSH_HOSTKEY_RSA
  language: ssh-config
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: RSA
  usage_type: signing
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: '^\s*HostKey\b[^#]*\bssh_host_rsa_key\b'
    flags: i
  message: "sshd HostKey uses an RSA host key - RSA host authentication is quantum-vulnerable (Shor's algorithm)."
  recommendation: "Inventory for migration to ML-DSA (FIPS 204) host keys as OpenSSH support lands; plan host-key rotation."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'HostKey /etc/ssh/ssh_host_rsa_key'
    no_match:
      - 'HostKey /etc/ssh/ssh_host_ed25519_key'
