- id: SSH_CIPHERS_AES128
  language: ssh-config
  category: weak-cipher
  layer: detection
  severity: medium
  algorithm: AES-128
  usage_type: encryption
  quantum_safety: grover_weakened
  key_size: 128
  detector:
    type: regex
    pattern: '^\s*Ciphers\b[^#]*\baes128-'
    flags: i
  message: "sshd Ciphers allows aes128-* - 128-bit AES keys are weakened to ~64-bit security by Grover's algorithm."
  recommendation: "Use AES-256 (aes256-gcm@openssh.com) to retain a 128-bit security margin."
  cwe: [326]
  confidence: 0.95
  examples:
    match:
      - 'Ciphers aes128-ctr,aes256-ctr'
    no_match:
      - 'Ciphers aes256-gcm@openssh.com'
- id: SSH_CIPHERS_3DES
