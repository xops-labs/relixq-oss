- id: SSH_KEX_ECDH
  language: ssh-config
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: ECDH
  usage_type: key_exchange
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: '^\s*KexAlgorithms\b[^#]*\b(ecdh-sha2|curve25519-sha256)'
    flags: i
  message: "sshd KexAlgorithms allows classical elliptic-curve key exchange (ecdh-sha2-*/curve25519-sha256) - quantum-vulnerable (Shor's algorithm)."
  recommendation: "Prefer hybrid PQC kex: mlkem768x25519-sha256 (OpenSSH 9.9+) or sntrup761x25519-sha512."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'KexAlgorithms curve25519-sha256,ecdh-sha2-nistp256'
    no_match:
      - 'KexAlgorithms sntrup761x25519-sha512@openssh.com'
