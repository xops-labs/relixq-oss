#
# crypto-api DETECTION layer (OSS / community tree). These rules fire on
# quantum-vulnerable cryptographic primitives so the free scanner sees the
# threat surface it is named for. Regex is the recall floor; AST runners
# restore precision where available. The migration-enrichment layer (NIST/FIPS
# substitutions, vertical context, references) is supplied by an optional external rule-pack overlay
# under the same id and is overlaid at report time by package enrich.

- id: PYTHON_ECDSA_GEN
  language: python
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "ECDSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "\\bec\\.generate_private_key\\s*\\("
  message: "Elliptic-curve key generation. ECDSA/ECDH are quantum-vulnerable."
  recommendation: "Migrate signatures to ML-DSA (FIPS 204) or SLH-DSA (FIPS 205); key establishment to ML-KEM (FIPS 203)."
  cwe: [327]
  examples:
    match:
      - 'private_key = ec.generate_private_key(ec.SECP256R1())'
    no_match:
      - 'private_key = rsa.generate_private_key(public_exponent=65537, key_size=2048)'

