# Aliased-import detection: `from cryptography.hazmat.primitives.asymmetric
# import rsa as r` defeats the canonical-module-name call patterns above, so
# the import line itself is the regex floor's detection point.
- id: PYTHON_ASYM_IMPORT_RSA_ALIASED
  language: python
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "RSA"
  usage_type: "import"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: 'from\s+cryptography\.hazmat\.primitives\.asymmetric\s+import\s+[^#]*\brsa\s+as\s+\w+'
  message: "RSA module imported under an alias - downstream calls evade name-based detection; RSA is quantum-vulnerable."
  recommendation: "Migrate signatures to ML-DSA (FIPS 204) and key establishment to ML-KEM (FIPS 203) or hybrid X25519MLKEM768."
  cwe: [327]
  confidence: 0.85
  examples:
    match:
      - 'from cryptography.hazmat.primitives.asymmetric import rsa as asym_rsa'
    no_match:
      - 'from cryptography.hazmat.primitives.asymmetric import rsa'

