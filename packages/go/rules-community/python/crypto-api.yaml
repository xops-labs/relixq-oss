# Hand-rolled crypto heuristic: textbook RSA implemented on bigints has no
# library import to match, but `e = 65537` and the pow(message, exponent, n)
# modular-exponentiation shape are a strong joint fingerprint. Low confidence
# by design - this is a lead for review, not a verdict.
- id: PYTHON_HANDROLLED_RSA
  language: python
  category: handrolled-crypto
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: '\be\s*=\s*65537\b|\bpow\s*\(\s*\w+\s*,\s*\w+\s*,\s*n\s*\)'
  message: "Possible hand-rolled RSA (textbook modular-exponentiation fingerprint: e = 65537 / pow(x, y, n)). Manual review required."
  recommendation: "Replace hand-rolled RSA with a vetted library, then migrate to ML-KEM (FIPS 203) / ML-DSA (FIPS 204)."
  cwe: [327]
  confidence: 0.4
  examples:
    match:
      - 'e = 65537'
      - 'cipher = pow(message, e, n)'
    no_match:
      - 'digest = pow(base, exponent)'
