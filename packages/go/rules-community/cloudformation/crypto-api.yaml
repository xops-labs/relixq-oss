#
# crypto-api DETECTION layer (OSS / community tree). These rules fire on
# quantum-vulnerable cryptographic primitives so the free scanner sees the
# threat surface it is named for. Regex is the recall floor; AST runners
# restore precision where available. The migration-enrichment layer (NIST/FIPS
# substitutions, vertical context, references) is supplied by an optional external rule-pack overlay
# under the same id and is overlaid at report time by package enrich.

- id: CFN_EC2_LAUNCHTEMPLATE_KMS_REF
  language: cloudformation
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "KMS"
  usage_type: "kms"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "\"?KmsKeyId\"?\\s*:\\s*\"?(arn:aws:kms|!Ref|!GetAtt|\\{\\s*\"Ref\")"
  file_globs:
    - "*.template.yaml"
    - "*.template.yml"
    - "*.template.json"
    - "cfn-*.yaml"
    - "cfn-*.yml"
    - "cfn-*.json"
    - "cloudformation/**/*.yaml"
    - "cloudformation/**/*.yml"
    - "cloudformation/**/*.json"
    - "**/cloudformation/**/*.yaml"
    - "**/cloudformation/**/*.json"
    - "**/cfn/**/*.yaml"
    - "**/cfn/**/*.json"
  message: "EBS volume / launch-template references a KMS key — verify the referenced key's KeySpec is on the inventory."
  confidence: 0.4
