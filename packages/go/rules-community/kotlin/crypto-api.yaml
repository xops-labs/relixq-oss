- id: KOTLIN_ANDROID_KEYSTORE_RSA_SHORT_KEY
  language: kotlin
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "setKeySize\\s*\\(\\s*(?:512|768|1024|1536|2047)\\s*\\)"
  message: "KeyGenParameterSpec.Builder.setKeySize(<2048) — RSA keys below 2048 bits are no longer considered safe (NIST SP 800-131A)."
  cwe: [326]
  confidence: 0.9

