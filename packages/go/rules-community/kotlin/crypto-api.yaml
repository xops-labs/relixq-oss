- id: KOTLIN_RSA_PKCS1_PADDING
  language: kotlin
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "encryption"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "Cipher\\.getInstance\\s*\\(\\s*\"RSA/ECB/PKCS1Padding\""
  message: "Cipher.getInstance(\"RSA/ECB/PKCS1Padding\") — PKCS#1 v1.5 RSA encryption is vulnerable to Bleichenbacher oracle attacks."
  cwe: [326, 327]
  confidence: 0.97

- id: KOTLIN_IMPORT_MESSAGE_DIGEST
  language: kotlin
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "hashing"
  usage_type: "hashing"
  quantum_safety: not_applicable
  detector:
    type: regex
    pattern: "(?:^|\\b)import\\s+java\\.security\\.MessageDigest\\b"
  message: "import java.security.MessageDigest — hashing API in use; review algorithm choice."

