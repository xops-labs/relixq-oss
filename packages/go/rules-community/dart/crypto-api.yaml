#
# crypto-api DETECTION layer (OSS / community tree). These rules fire on
# quantum-vulnerable cryptographic primitives so the free scanner sees the
# threat surface it is named for. Regex is the recall floor; AST runners
# restore precision where available. The migration-enrichment layer (NIST/FIPS
# substitutions, vertical context, references) is supplied by an optional external rule-pack overlay
# under the same id and is overlaid at report time by package enrich.

- id: DART_IMPORT_CRYPTO_PACKAGE
  language: dart
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "GoogleCryptoPackage"
  usage_type: "dependency"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "import\\s+['\"]package:crypto/crypto\\.dart['\"]"
  message: "Imports package:crypto — Google reference hash/HMAC library; inventory all .convert() and Hmac() call sites."
  confidence: 0.5

- id: DART_IMPORT_POINTYCASTLE
  language: dart
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "PointyCastle"
  usage_type: "dependency"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "import\\s+['\"]package:pointycastle/[^'\"]+['\"]"
  message: "Imports package:pointycastle — pure-Dart BouncyCastle port; broad legacy-crypto surface (DES/RC4/MD5/RSA/ECDSA)."
  confidence: 0.75

- id: DART_IMPORT_CRYPTOGRAPHY_PACKAGE
  language: dart
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "GohillaCryptography"
  usage_type: "dependency"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "import\\s+['\"]package:cryptography/cryptography\\.dart['\"]"
  message: "Imports package:cryptography — modern crypto library; still pre-PQC (Ed25519/X25519/AES-GCM)."
  confidence: 0.4

- id: DART_RSA_KEYSIZE_2048
  language: dart
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "RSA-2048"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  key_size: 2048
  detector:
    type: regex
    pattern: "RSAKeyGeneratorParameters\\s*\\(\\s*BigInt\\.\\w+\\([^)]*\\)\\s*,\\s*2048\\b"
  message: "RSAKeyGeneratorParameters(..., 2048, ...) — RSA-2048; current floor, still quantum-vulnerable."
  confidence: 0.6
