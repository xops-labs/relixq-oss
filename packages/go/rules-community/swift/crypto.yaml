# Swift crypto rules
# Apple platforms expose cryptography through three primary surfaces:
#   - CommonCrypto       (C-shim, legacy; broken hashes still ship here)
#   - Security framework (SecKey APIs; RSA/ECC key generation)
#   - CryptoKit          (modern Swift API; the `Insecure` namespace tags
#                         MD5/SHA1 as Apple-flagged insecure primitives)
#
# The swiftast (Tree-sitter) runner accepts these query forms:
#   call:<dotted.path>   — `Type(...)`, `Type.method(...)`, `pkg.Type.method(...)`,
#                          or a free function such as `CC_MD5(...)`.
#   init:<Type>          — Swift initializer call `Type(...)` (alias for
#                          `call:Type` — Swift has no `new` keyword).
#   import:<Module>      — `import Module` or `import Module.Submodule`
#                          (trailing `.*` is a rule-side wildcard).
#   memberref:<dotted>   — `Type.member` reference NOT in call position.
#
# Note on quantum_safety values: the canonical CryptoFinding schema defines
# `vulnerable`, `hybrid`, `quantum_safe`, `unknown` — there is no `weak` enum
# member. Broken classical hashes (MD5/SHA1) are tagged `vulnerable` here even
# though the threat is pre-quantum cryptanalysis (collisions, length-extension)
# rather than Shor's algorithm. Severity carries the nuance.
#
# Argument-value matching is intentionally NOT in the AST DSL — rules that
# need to discriminate string literals (e.g. `kSecAttrKeyTypeRSA` vs
# `kSecAttrKeyTypeECSECPrimeRandom` inside an attribute dictionary) stay on
# the regex detector.

# --- CommonCrypto: broken hash free functions -------------------------------
- id: SWIFT_CC_MD5
  language: swift
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: hashing
  quantum_safety: classically_broken
  detector:
    type: ast
    query: "call:CC_MD5"
  message: "CC_MD5(...) — MD5 is cryptographically broken (collisions trivial since 2004)."
  recommendation: "Use CryptoKit `SHA256.hash(data:)` or `SHA3_256` for non-secret hashing; for HMAC use `HMAC<SHA256>`."
  cwe: [328]
  confidence: 0.97
