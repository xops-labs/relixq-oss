# --- CryptoKit: Apple-flagged `Insecure` namespace --------------------------
- id: SWIFT_INSECURE_MD5_HASH
  language: swift
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: hashing
  quantum_safety: classically_broken
  detector:
    type: ast
    query: "call:Insecure.MD5.hash"
  message: "Insecure.MD5.hash(...) — Apple flags this in the `Insecure` namespace; MD5 is broken."
  recommendation: "Use `SHA256.hash(data:)` or `SHA3_256.hash(data:)` from CryptoKit."
  cwe: [328]
  confidence: 0.98
- id: SWIFT_INSECURE_MD5_INIT
  language: swift
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: hashing
  quantum_safety: classically_broken
  detector:
    type: ast
    query: "memberref:Insecure.MD5"
  message: "Reference to `Insecure.MD5` — Apple flags this primitive as insecure."
  recommendation: "Switch the hasher type to CryptoKit `SHA256` or `SHA3_256`."
  cwe: [328]
  confidence: 0.9
