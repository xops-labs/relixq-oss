# --- CommonCrypto: symmetric cipher constants (regex; multi-symbol) --------
- id: SWIFT_CC_ALGORITHM_DES
  language: swift
  category: weak-cipher
  severity: high
  algorithm: DES
  usage_type: encryption
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: '\bkCCAlgorithmDES\b'
  message: "kCCAlgorithmDES — single-DES has a 56-bit key and is brute-forceable."
  recommendation: "Use AES-256-GCM (kCCAlgorithmAES with kCCKeySizeAES256) or CryptoKit `AES.GCM`."
  cwe: [327, 326]
  confidence: 0.95
- id: SWIFT_CC_ALGORITHM_3DES
  language: swift
  category: weak-cipher
  severity: high
  algorithm: 3DES
  usage_type: encryption
  quantum_safety: grover_weakened
  detector:
    type: regex
    pattern: '\bkCCAlgorithm3DES\b'
  message: "kCCAlgorithm3DES — 3DES is deprecated (NIST SP 800-131A) and offers ~112-bit security."
  recommendation: "Use AES-256-GCM (kCCAlgorithmAES with kCCKeySizeAES256) or CryptoKit `AES.GCM`."
  cwe: [327]
  confidence: 0.95
- id: SWIFT_CC_ALGORITHM_RC4
  language: swift
  category: weak-cipher
  severity: high
  algorithm: RC4
  usage_type: encryption
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: '\bkCCAlgorithmRC4\b'
  message: "kCCAlgorithmRC4 — RC4 has known biases and is prohibited by RFC 7465."
  recommendation: "Use AES-256-GCM (kCCAlgorithmAES with kCCKeySizeAES256) or ChaCha20-Poly1305 via CryptoKit."
  cwe: [327]
  confidence: 0.95
