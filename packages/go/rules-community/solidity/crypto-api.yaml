#
# crypto-api DETECTION layer (OSS / community tree). These rules fire on
# quantum-vulnerable cryptographic primitives so the free scanner sees the
# threat surface it is named for. Regex is the recall floor; AST runners
# restore precision where available. The migration-enrichment layer (NIST/FIPS
# substitutions, vertical context, references) is supplied by an optional external rule-pack overlay
# under the same id and is overlaid at report time by package enrich.

- id: SOLIDITY_ECRECOVER
  language: solidity
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "ECDSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "\\becrecover\\s*\\("
  message: "ecrecover(...) — secp256k1 ECDSA signature recovery; quantum-vulnerable (Shor)."
  cwe: [327]
  confidence: 0.95

- id: SOLIDITY_KECCAK256_GENERIC
  language: solidity
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "Keccak256"
  usage_type: "hashing"
  quantum_safety: grover_weakened
  detector:
    type: regex
    pattern: "\\bkeccak256\\s*\\("
  message: "keccak256(...) — Grover halves effective preimage security from 256 to 128 bits; inventory hash usage."
  confidence: 0.35

- id: SOLIDITY_SHA256_GLOBAL
  language: solidity
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "SHA256"
  usage_type: "hashing"
  quantum_safety: grover_weakened
  detector:
    type: regex
    pattern: "\\bsha256\\s*\\("
  message: "sha256(...) — precompile 0x02; Grover halves effective preimage security."
  confidence: 0.55

- id: SOLIDITY_ADDMOD_MULMOD
  language: solidity
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "ModularArithmetic"
  usage_type: "math"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "\\b(?:addmod|mulmod)\\s*\\("
  message: "addmod/mulmod used — likely BN254 / BLS12-381 pairing or scalar-field math; review for PQC alternatives."
  confidence: 0.4

- id: SOLIDITY_IMPORT_OPENZEPPELIN_ECDSA
  language: solidity
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "ECDSA"
  usage_type: "dependency"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "import\\s+(?:[^;]*\\s+from\\s+)?[\"'][^\"']*@openzeppelin/contracts/(?:utils/)?cryptography/ECDSA\\.sol[\"']"
  message: "Imports @openzeppelin/contracts/.../cryptography/ECDSA.sol — secp256k1 ECDSA helpers; quantum-vulnerable."
  cwe: [327]
  confidence: 0.9

- id: SOLIDITY_IMPORT_OPENZEPPELIN_EIP712
  language: solidity
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "ECDSA"
