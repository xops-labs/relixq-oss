    pattern: ":=\\s*keccak256\\s*\\("
  message: "Yul `:= keccak256(...)` — assembly-resident two-arg opcode call."
  confidence: 0.55

- id: SOLIDITY_PRAGMA_OUTDATED
  language: solidity
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "SolidityCompiler"
  usage_type: "language_version"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "pragma\\s+solidity\\s+[\\^~>=<\\s]*0\\.(?:[0-7])\\b"
  message: "pragma solidity targets a pre-0.8 compiler — wraparound arithmetic by default and weaker ecrecover semantics."
  cwe: [682]
  confidence: 0.85
