  confidence: 0.95

- id: SOLIDITY_PRECOMPILE_ECRECOVER
  language: solidity
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "ECDSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "staticcall\\s*\\(\\s*[^,]+,\\s*(?:0x0*1\\b|1\\b)\\s*,"
  message: "Inline-assembly staticcall to precompile 0x01 — direct ecrecover invocation; quantum-vulnerable."
  cwe: [327]
  confidence: 0.88

