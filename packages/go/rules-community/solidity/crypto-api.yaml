- id: SOLIDITY_ECDSA_RECOVER
  language: solidity
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "ECDSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
