- id: SOLIDITY_ASSEMBLY_ECRECOVER_OPCODE
  language: solidity
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "ECDSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: ":=\\s*ecrecover\\b"
  message: "Yul `:= ecrecover` — assembly-resident signature recovery, bypasses high-level safety wrappers."
  cwe: [327]
  confidence: 0.9

- id: SOLIDITY_ASSEMBLY_KECCAK256_OPCODE
  language: solidity
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "Keccak256"
  usage_type: "hashing"
  quantum_safety: grover_weakened
  detector:
