- id: APACHE_SSLHONORCIPHERORDER_OFF
  language: apache
  category: misconfig
  severity: medium
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["*.htaccess", "httpd.conf", "apache2.conf", "*.apache.conf", "sites-available/*.conf", "vhosts.d/*.conf"]
  detector:
    type: regex
    pattern: '^\s*SSLHonorCipherOrder\s+off\b'
    flags: i
  message: "Apache SSLHonorCipherOrder is off — clients can negotiate weaker ciphers than the server prefers."
  recommendation: "Set 'SSLHonorCipherOrder on' so the server-configured cipher order wins under TLS 1.2."
  cwe: [757]
  confidence: 0.85
  examples:
    match:
      - 'SSLHonorCipherOrder off'
    no_match:
      - 'SSLHonorCipherOrder on'
- id: APACHE_SSLCERTKEY_INSECURE_PATH
  language: apache
  category: hardcoded-key
  severity: high
  algorithm: TLS
  usage_type: key_storage
  quantum_safety: vulnerable
  file_globs: ["*.htaccess", "httpd.conf", "apache2.conf", "*.apache.conf", "sites-available/*.conf", "vhosts.d/*.conf"]
  detector:
    type: regex
    pattern: '^\s*SSLCertificateKeyFile\s+("?)(/tmp/|/var/tmp/|\./|\.\./)'
  message: "Apache SSLCertificateKeyFile points at an insecure path (temp / relative directory)."
  recommendation: "Store TLS private keys under /etc/ssl/private/ (mode 0600) or load via a secret manager."
  cwe: [798, 922]
  confidence: 0.85
  examples:
    match:
      - 'SSLCertificateKeyFile /tmp/server.key'
    no_match:
      - 'SSLCertificateKeyFile /etc/ssl/private/server.key'
- id: APACHE_SSLENGINE_OFF
  language: apache
  category: misconfig
  severity: info
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["*.htaccess", "httpd.conf", "apache2.conf", "*.apache.conf", "sites-available/*.conf", "vhosts.d/*.conf"]
  detector:
    type: regex
    pattern: '^\s*SSLEngine\s+off\b'
    flags: i
  message: "Apache SSLEngine is explicitly disabled on this VirtualHost — traffic is plaintext."
  recommendation: "If this VirtualHost serves user traffic, set 'SSLEngine on' and provision a certificate. Otherwise confirm this is the intentional :80 redirect host."
  cwe: [319]
  confidence: 0.6
  examples:
    match:
      - 'SSLEngine off'
    no_match:
      - 'SSLEngine on'
- id: APACHE_SSLCOMPRESSION_ON
  language: apache
  category: misconfig
  severity: medium
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["*.htaccess", "httpd.conf", "apache2.conf", "*.apache.conf", "sites-available/*.conf", "vhosts.d/*.conf"]
  detector:
    type: regex
    pattern: '^\s*SSLCompression\s+on\b'
    flags: i
  message: "Apache SSLCompression is enabled (CRIME attack exposure)."
  recommendation: "Set 'SSLCompression off' (default in 2.4.4+). Compression at the TLS layer leaks plaintext via length oracles."
  references:
    - "https://en.wikipedia.org/wiki/CRIME"
  cwe: [310]
  confidence: 0.95
  examples:
    match:
      - 'SSLCompression on'
    no_match:
      - 'SSLCompression off'
