- id: VERILOG_PARAM_RSA_SMALL_EXPONENT
  language: verilog
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "RSA"
  usage_type: "constant"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "parameter\\s+(?:\\[[^\\]]+\\]\\s+)?\\w*EXPONENT\\w*\\s*=\\s*\\d+'h(?:3|5|11|13|17|10001)\\b"
  message: "Parameter *EXPONENT* with small-RSA-exponent hex literal — inventory RSA signature-verification IP."
  cwe: [327]
  confidence: 0.7

- id: VERILOG_PARAM_AES_SBOX
  language: verilog
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "AES"
  usage_type: "constant"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "parameter\\s+(?:\\[[^\\]]+\\]\\s+)?\\w*SBOX\\w*\\s*="
  message: "Parameter *SBOX* — AES S-box ROM declaration; AES IP fingerprint."
  confidence: 0.55

- id: VERILOG_PORT_LEGACY_CRYPTO_OUTPUT
  language: verilog
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "LegacyCrypto"
  usage_type: "port"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "output\\s+\\[\\d+:0\\]\\s*(?:signature|cipher_text)\\b"
  message: "Module output port emits signature / cipher_text — legacy crypto IP surface."
  cwe: [327]
  confidence: 0.75
