# ---------------------------------------------------------------------------
# Microsoft.Cdn/profiles/endpoints — HTTPS redirect disabled
# ---------------------------------------------------------------------------
- id: BICEP_CDN_HTTPS_REDIRECT_DISABLED
  language: bicep
  category: weak-tls
  severity: medium
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  # CDN endpoints can have isHttpAllowed: true and / or no redirect
  # rule. Heuristic: explicit isHttpAllowed: true is a clear smell.
  detector:
    type: regex
    pattern: "\\bisHttpAllowed\\s*:\\s*true\\b"
  message: "CDN endpoint allows plain HTTP (isHttpAllowed: true) — clients can downgrade to unencrypted transport."
  recommendation: "Set isHttpAllowed: false and isHttpsAllowed: true, or configure a delivery rule to redirect HTTP→HTTPS at the edge."
  cwe: [319]
  confidence: 0.9
# ---------------------------------------------------------------------------
# Hardcoded admin-password parameter defaults
# ---------------------------------------------------------------------------
- id: BICEP_HARDCODED_ADMIN_PASSWORD
  language: bicep
  category: hardcoded-secret
  severity: critical
  algorithm: Secret
  usage_type: secret_storage
  quantum_safety: vulnerable
  # Bicep parameter with default literal: `param adminPassword string =
  # 'literal'`. Bicep has a `@secure()` decorator that should be used
  # for secret parameters, and a default value defeats both the
  # decorator's intent and basic secret-handling hygiene.
  # Decoration in Bicep also expects no inline default. We match the
  # broader anti-pattern: any `param ... adminPassword string = '...'`
  # with a quoted literal default. The regex is case-insensitive via
  # flags to catch AdminPassword / ADMIN_PASSWORD spellings.
  detector:
    type: regex
    pattern: "\\bparam\\s+\\w*[Aa]dmin[Pp]assword\\w*\\s+string\\s*=\\s*'[^']+'"
    flags: ""
  message: "Bicep parameter declares an admin-password default with a literal value — secrets must not be committed to source."
  recommendation: "Use the @secure() decorator and pass the value via a Key Vault reference (`getSecret`) or a deployment-time parameter file that is itself protected."
  cwe: [798]
  confidence: 0.9
