# F# crypto rules
#
# F# shares the .NET BCL crypto surface (`System.Security.Cryptography`) with
# C#; the only relevant differences for static detection are F# syntax:
#   - `let x = new AesManaged()` rather than `var x = new AesManaged();`
#   - Property mutation uses the `<-` token, e.g. `cipher.KeySize <- 1024`.
#   - No trailing semicolons; module / nested-let scoping.
# These rules are regex-only for this batch. A long-term Roslyn-dual-register
# path (re-use the C# Roslyn AST runner against F# via FSharp.Compiler.Service
# or the F# tooling MSBuildWorkspace) is left as a future upgrade.
#
# Rule-ID prefix: FSHARP_

# ---------------------------------------------------------------------------
# Namespace import — inventory surface
# ---------------------------------------------------------------------------
- id: FSHARP_MD5_SERVICEPROVIDER
  language: fsharp
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: hashing
  quantum_safety: classically_broken
  # `let hasher = new MD5CryptoServiceProvider()` — direct instantiation of
  # the legacy MD5 implementation class.
  detector:
    type: regex
    pattern: 'new\s+MD5CryptoServiceProvider\s*\('
  message: "MD5CryptoServiceProvider instantiation in F# — MD5 is cryptographically broken (collision attacks since 2004)."
  recommendation: "Replace MD5 with SHA-256 (or SHA-3 / BLAKE2 for new code) via `SHA256.Create()`. For password hashing use Argon2id or PBKDF2 with high iteration counts."
  cwe: [328, 327]
  confidence: 0.9
- id: FSHARP_MD5_CREATE
  language: fsharp
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: hashing
  quantum_safety: classically_broken
  # `MD5.Create()` factory call.
  detector:
    type: regex
    pattern: 'MD5\.Create\s*\(\s*\)'
  message: "`MD5.Create()` in F# — MD5 hash factory; algorithm is broken for any security-relevant use."
  recommendation: "Switch to `SHA256.Create()` or `SHA3_256.Create()` (NET 8+) for general hashing; use Argon2id / PBKDF2 for password storage."
  cwe: [328, 327]
  confidence: 0.9
- id: FSHARP_HASHLIB_MD5_WRAPPER
  language: fsharp
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: hashing
  quantum_safety: classically_broken
  # F# community-style hashing wrapper: `Hashlib.Md5`. Common pattern when
  # functional codebases wrap BCL primitives behind module accessors.
  detector:
    type: regex
    pattern: 'Hashlib\.Md5\b'
  message: "`Hashlib.Md5` accessor in F# — exposes broken MD5 hashing primitive through a module facade."
  recommendation: "Retire the `Hashlib.Md5` accessor; replace callers with a SHA-256 wrapper and remove the MD5 surface entirely."
  cwe: [328]
  confidence: 0.75
