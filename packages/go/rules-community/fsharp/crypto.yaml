# ---------------------------------------------------------------------------
# TLS protocol selection — deprecated versions
# ---------------------------------------------------------------------------
- id: FSHARP_TLS_OLD_PROTOCOL
  language: fsharp
  category: weak-tls
  severity: high
  algorithm: TLS
  usage_type: transport
  quantum_safety: vulnerable
  # SecurityProtocolType.Ssl3 / Tls / Tls10 / Tls11 are all deprecated. The
  # enum spelling `Tls` (no suffix) means TLS 1.0; we match `Tls$` only via the
  # bare token form on the right of `.` — handled with an alternation that
  # explicitly avoids Tls12 / Tls13.
  detector:
    type: regex
    pattern: 'SecurityProtocolType\.(?:Ssl3|Tls10|Tls11)\b'
  message: "Deprecated TLS protocol enum in F# (Ssl3 / Tls10 / Tls11)."
  recommendation: "Require TLS 1.2 minimum (TLS 1.3 preferred). Use `SecurityProtocolType.Tls12 ||| SecurityProtocolType.Tls13`."
  cwe: [326, 327]
  confidence: 0.9
- id: FSHARP_SERVICEPOINT_DEPRECATED_TLS
  language: fsharp
  category: weak-tls
  severity: high
  algorithm: TLS
  usage_type: transport
  quantum_safety: vulnerable
  # Pattern: `ServicePointManager.SecurityProtocol <- SecurityProtocolType.Tls`
  # (bare Tls = TLS 1.0) or `... <- SecurityProtocolType.Tls11` / `Ssl3`. RE2
  # has no negative lookahead, so we enumerate the deprecated suffixes
  # explicitly and require a word boundary so `Tls12` / `Tls13` are excluded.
  detector:
    type: regex
    pattern: 'ServicePointManager\.SecurityProtocol\s*<-\s*SecurityProtocolType\.(?:Ssl3|Tls10|Tls11|Tls)\b'
  message: "`ServicePointManager.SecurityProtocol <- SecurityProtocolType.<deprecated>` in F#."
  recommendation: "Set `ServicePointManager.SecurityProtocol <- SecurityProtocolType.Tls12 ||| SecurityProtocolType.Tls13`; prefer TLS 1.3."
  cwe: [326, 327]
  confidence: 0.9
