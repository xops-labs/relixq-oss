# RNG — legacy API
# ---------------------------------------------------------------------------
- id: FSHARP_RNG_LEGACY_API
  language: fsharp
  category: weak-rng
  severity: info
  algorithm: RNG
  usage_type: random
  quantum_safety: vulnerable
  # `RNGCryptoServiceProvider()` is functionally OK (it wraps the OS CSPRNG)
  # but the class is obsolete as of .NET 6 and replaced by
  # `RandomNumberGenerator.Create()`. Surface for inventory.
  detector:
    type: regex
    pattern: 'RNGCryptoServiceProvider\(\)'
  message: "`RNGCryptoServiceProvider()` in F# — the class is obsoleted (.NET 6+) in favor of `RandomNumberGenerator.Create()`."
  recommendation: "Replace `RNGCryptoServiceProvider()` with `RandomNumberGenerator.Create()`; behavior is identical, surface is maintained."
  cwe: []
  confidence: 0.5
