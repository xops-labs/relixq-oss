# ---------------------------------------------------------------------------
# F# property mutation — `.KeySize <- N` with small N
# ---------------------------------------------------------------------------
- id: FSHARP_KEYSIZE_MUTATION_1024
  language: fsharp
  category: weak-key
  severity: high
  algorithm: RSA
  usage_type: key_generation
  quantum_safety: vulnerable
  key_size: 1024
  # F# uses `<-` for property/mutable assignment: `rsa.KeySize <- 1024`. The
  # spaces around `<-` are optional but conventional.
  detector:
    type: regex
    pattern: '\.KeySize\s*<-\s*1024\b'
  message: "`.KeySize <- 1024` in F# — explicit mutation to a 1024-bit key; below NIST 2030 floor."
  recommendation: "Set `.KeySize <- 3072` or stronger as a transition baseline; migrate the surrounding flow to ML-KEM / ML-DSA."
  cwe: [326]
  confidence: 0.9
- id: FSHARP_KEYSIZE_MUTATION_512
  language: fsharp
