#
# crypto-api DETECTION layer (OSS / community tree). These rules fire on
# quantum-vulnerable cryptographic primitives so the free scanner sees the
# threat surface it is named for. Regex is the recall floor; AST runners
# restore precision where available. The migration-enrichment layer (NIST/FIPS
# substitutions, vertical context, references) is supplied by an optional external rule-pack overlay
# under the same id and is overlaid at report time by package enrich.

- id: SCALA_RSA_KEYGEN
  language: scala
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "RSA"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "KeyPairGenerator\\.getInstance\\s*\\(\\s*\"[Rr][Ss][Aa]\""
  message: "KeyPairGenerator.getInstance(\"RSA\") — RSA is quantum-vulnerable."
  cwe: [327]
  confidence: 0.95

- id: SCALA_DSA_KEYGEN
  language: scala
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "DSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "KeyPairGenerator\\.getInstance\\s*\\(\\s*\"[Dd][Ss][Aa]\""
  message: "KeyPairGenerator.getInstance(\"DSA\") — DSA is deprecated (NIST SP 800-131A) and quantum-vulnerable."
  cwe: [327]
  confidence: 0.95

- id: SCALA_EC_KEYGEN
  language: scala
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "ECDSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "KeyPairGenerator\\.getInstance\\s*\\(\\s*\"[Ee][Cc]\""
  message: "KeyPairGenerator.getInstance(\"EC\") — classical ECC is quantum-vulnerable."
  cwe: [327]
  confidence: 0.95

- id: SCALA_RSA_PKCS1_PADDING
  language: scala
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "encryption"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "Cipher\\.getInstance\\s*\\(\\s*\"RSA/ECB/PKCS1Padding\""
  message: "Cipher.getInstance(\"RSA/ECB/PKCS1Padding\") — PKCS#1 v1.5 RSA encryption is vulnerable to Bleichenbacher oracle attacks."
  cwe: [326, 327]
  confidence: 0.97

- id: SCALA_IMPORT_CIPHER
  language: scala
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "CIPHER"
  usage_type: "encryption"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?:^|\\b)import\\s+javax\\.crypto\\.Cipher\\b"
  message: "import javax.crypto.Cipher — JCA cipher entry point; audit DES/3DES/RC4 and RSA/ECB/PKCS1Padding usages."
  cwe: [327]

- id: SCALA_IMPORT_KEY_PAIR_GENERATOR
  language: scala
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "PKI"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?:^|\\b)import\\s+java\\.security\\.KeyPairGenerator\\b"
  message: "import java.security.KeyPairGenerator — JCA key-generation entry point; audit RSA/DSA/EC usages."
  cwe: [327]

- id: SCALA_TSEC_RSA_SIGNATURE
  language: scala
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "tsec\\.signature\\.jca\\.SHA(?:1|256|384|512)withRSA\\b"
  message: "tsec.signature.jca.*withRSA — classical RSA signatures are quantum-vulnerable; SHA1withRSA is also classically broken."
  cwe: [327]
  confidence: 0.9

- id: SCALA_BC_PROVIDER_NEW
  language: scala
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "PROVIDER"
  usage_type: "key_generation"
  quantum_safety: not_applicable
  detector:
    type: regex
    pattern: "\\bnew\\s+BouncyCastleProvider\\b"
  message: "new BouncyCastleProvider — registers BC for classical algorithms; PQC algorithms require BouncyCastlePQCProvider separately."
  cwe: [327]

- id: SCALA_BC_IMPORT
  language: scala
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "PROVIDER"
  usage_type: "key_generation"
  quantum_safety: not_applicable
  detector:
    type: regex
    pattern: "(?:^|\\b)import\\s+org\\.bouncycastle\\.jce\\.provider\\.BouncyCastleProvider\\b"
  message: "import BouncyCastleProvider — audit registered algorithm set and add the PQC provider."
  cwe: [327]

- id: SCALA_PLAY_CRYPTO_DEPRECATED
  language: scala
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "SYMMETRIC"
  usage_type: "encryption"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "play\\.api\\.libs\\.Crypto\\b"
  message: "play.api.libs.Crypto is deprecated (Play 2.6) and removed (Play 2.7); historical implementation used AES-CTR with weak key derivation."
  cwe: [327, 328]
  confidence: 0.9

- id: SCALA_PLAY_CRYPTO_IMPORT
  language: scala
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "SYMMETRIC"
  usage_type: "encryption"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?:^|\\b)import\\s+play\\.api\\.libs\\.Crypto\\b"
  message: "import play.api.libs.Crypto — deprecated Play crypto API."
  cwe: [327]
