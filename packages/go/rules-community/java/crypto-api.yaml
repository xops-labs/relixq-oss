# Signature.getInstance("<digest>with<ALG>") JCA identifiers.
- id: JAVA_SIGNATURE_RSA
  language: java
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "RSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: 'Signature\.getInstance\s*\(\s*"[A-Za-z0-9]+withRSA'
  message: "Signature.getInstance(\"...withRSA\") - RSA signatures are quantum-vulnerable (Shor's algorithm)."
  recommendation: "Migrate signatures to ML-DSA (FIPS 204) or SLH-DSA (FIPS 205)."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'Signature sig = Signature.getInstance("SHA256withRSA");'
    no_match:
      - 'Signature sig = Signature.getInstance("SHA256withECDSA");'

