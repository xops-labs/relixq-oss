- id: JAVA_RSA_PKCS1_PADDING
  language: java
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "encryption"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "Cipher\\.getInstance\\s*\\(\\s*\"RSA/ECB/PKCS1Padding\""
  message: "Cipher.getInstance(\"RSA/ECB/PKCS1Padding\") — PKCS#1 v1.5 RSA encryption is vulnerable to Bleichenbacher oracle attacks."
  recommendation: "Use RSA-OAEP as an interim fix, then migrate key establishment to ML-KEM (FIPS 203)."
  cwe: [326, 327]
  confidence: 0.97
  examples:
    match:
      - 'Cipher cipher = Cipher.getInstance("RSA/ECB/PKCS1Padding");'
    no_match:
      - 'Cipher cipher = Cipher.getInstance("RSA/ECB/OAEPWithSHA-256AndMGF1Padding");'
