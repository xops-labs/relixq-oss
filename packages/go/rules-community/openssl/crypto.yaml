    no_match:
      - 'MinProtocol = TLSv1.3'
- id: OPENSSLCNF_CIPHERSTRING_RC4
  language: openssl-cnf
  category: weak-cipher
  severity: critical
  algorithm: RC4
  usage_type: encryption
  quantum_safety: classically_broken
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  detector:
    type: regex
    pattern: '^\s*CipherString\s*=\s*[^#\r\n]*\bRC4\b'
    flags: i
  message: "openssl.cnf CipherString references the broken RC4 stream cipher."
  recommendation: "Remove RC4. Use the DEFAULT@SECLEVEL=2 profile or an explicit AEAD list (e.g. ECDHE+AESGCM:ECDHE+CHACHA20)."
  references:
    - "https://datatracker.ietf.org/doc/html/rfc7465"
  cwe: [327]
  confidence: 0.97
  examples:
    match:
      - 'CipherString = RC4-SHA:HIGH'
    no_match:
      - 'CipherString = HIGH:!aNULL'
- id: OPENSSLCNF_CIPHERSTRING_DES_3DES
  language: openssl-cnf
  category: weak-cipher
  severity: high
  algorithm: 3DES
  usage_type: encryption
  quantum_safety: grover_weakened
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  detector:
    type: regex
    pattern: '^\s*CipherString\s*=\s*[^#\r\n]*\b(3DES|DES-CBC3|DES_CBC3|DES)\b'
    flags: i
  message: "openssl.cnf CipherString references DES/3DES — vulnerable to SWEET32 birthday attacks."
  recommendation: "Remove DES/3DES. Use AES-GCM or ChaCha20-Poly1305 suites."
  references:
    - "https://sweet32.info/"
  cwe: [327]
  confidence: 0.9
  examples:
    match:
      - 'CipherString = DES-CBC3-SHA'
    no_match:
      - 'CipherString = ECDHE-ECDSA-AES256-GCM-SHA384'
