- id: OPENSSLCNF_LEGACY_PROVIDER_ENABLED
  language: openssl-cnf
  category: misconfig
  severity: medium
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  detector:
    type: regex
    pattern: '^\s*legacy\s*=\s*legacy_sect\s*$'
    flags: i
  message: "openssl.cnf activates the legacy provider — re-enables MD2/MD4/MDC2/RC2/RC4/RC5/DES/Blowfish/CAST/IDEA/SEED/Whirlpool which OpenSSL 3 disabled by default."
  recommendation: "Remove `legacy = legacy_sect` from [provider_sect] unless a specific application requires a named legacy algorithm; if so, scope the workaround to that process, not the system-wide config."
  references:
    - "https://www.openssl.org/docs/man3.0/man7/OSSL_PROVIDER-legacy.html"
  cwe: [327]
  confidence: 0.85
  examples:
    match:
      - 'legacy = legacy_sect'
    no_match:
      - 'default = default_sect'
- id: OPENSSLCNF_OPTIONS_COMPRESSION_ENABLED
  language: openssl-cnf
  category: misconfig
  severity: medium
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  # RE2 has no negative lookahead, so we cannot match "Options line lacking
  # NoCompression" directly. Instead we match explicit positive anti-patterns:
  # `enable_compression = yes/true/on/1` (the OpenSSL directive that turns
  # CRIME-vulnerable compression back on). The line-anchored, value-truthy
  # form is unambiguous and avoids the NoCompression substring collision
  # entirely.
  detector:
    type: regex
    pattern: '^\s*enable_compression\s*=\s*(yes|true|on|1)\b'
    flags: i
  message: "openssl.cnf explicitly enables TLS Compression — CRIME-style compression oracle attack exposure."
  recommendation: "Set Options to include NoCompression (e.g. Options = ServerPreference,NoCompression) and remove any enable_compression flag."
  references:
    - "https://en.wikipedia.org/wiki/CRIME"
  cwe: [310]
  confidence: 0.7
  examples:
    match:
      - 'enable_compression = yes'
    no_match:
      - 'enable_compression = no'
- id: OPENSSLCNF_ENGINE_LEGACY
  language: openssl-cnf
  category: misconfig
  severity: medium
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  detector:
    type: regex
    pattern: '^\s*(default_algorithms|engine_id|dynamic_path)\s*=\s*[^#\r\n]*(legacy|gost|cryptodev)\b'
    flags: i
  message: "openssl.cnf references a legacy crypto ENGINE — engines often expose primitives (GOST, MDC2, RC2) that the platform otherwise withholds."
  recommendation: "Remove the ENGINE reference unless explicitly required. Prefer the OpenSSL 3 provider model with audited providers (default + fips, optionally oqsprovider for PQC)."
  cwe: [327]
  confidence: 0.7
  examples:
    match:
      - 'dynamic_path = /usr/lib/engines/libgost.so'
    no_match:
      - 'dynamic_path = /usr/lib/engines/libcapi.so'
