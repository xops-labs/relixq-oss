    flags: i
  message: "openssl.cnf CipherString includes EXPORT / LOW / MEDIUM / NULL cipher classes — FREAK and Logjam exposure."
  recommendation: "Drop the EXPORT/LOW/MEDIUM/NULL classes. Pin an explicit modern AEAD list (e.g. ECDHE+AESGCM:ECDHE+CHACHA20:!aNULL:!eNULL:!EXPORT:!LOW:!MEDIUM)."
  references:
    - "https://freakattack.com/"
    - "https://weakdh.org/"
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'CipherString = LOW:EXPORT40'
    no_match:
      - 'CipherString = HIGH:!aNULL'
- id: OPENSSLCNF_CIPHERSTRING_DEFAULT
  language: openssl-cnf
  category: misconfig
  severity: info
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  detector:
    type: regex
    pattern: '^\s*CipherString\s*=\s*DEFAULT\s*$'
    flags: i
  message: "openssl.cnf CipherString = DEFAULT — relies on the OpenSSL build's compiled-in default cipher list, which varies across distributions and versions."
  recommendation: "Pin an explicit, audited cipher list (e.g. DEFAULT@SECLEVEL=2, or an ECDHE+AEAD allowlist). Distro defaults have re-enabled weak suites historically."
  cwe: [757]
  confidence: 0.5
  examples:
    match:
      - 'CipherString = DEFAULT'
    no_match:
      - 'CipherString = DEFAULT@SECLEVEL=2'
