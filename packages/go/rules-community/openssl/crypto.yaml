# OpenSSL master-config (openssl.cnf) crypto rules
# (Tier 3.6, system-wide crypto policy).
#
# openssl.cnf is small but extraordinarily high-signal: a handful of
# directives in `[system_default_sect]` set the *system-wide* TLS posture
# (MinProtocol / CipherString / Ciphersuites). Other sections control CA
# defaults (default_md / default_bits) and provider activation (legacy
# provider, oqs-provider for PQC opt-in). Every line below targets one of
# those high-leverage directives.
#
# Strategy: regex-only, per-line. INI-style `key = value` patterns match
# cleanly without an INI parser. The rules use a dedicated
# `language: openssl-cnf` constant so they do not accidentally fire on
# arbitrary .ini / .cnf files used for other purposes.
#
# Glob fallback (`file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf"]`)
# keeps each rule from firing if a future language remap routes generic
# .cnf files to LangOpenSSLConf — the glob narrows back to the canonical
# filename pattern.
- id: OPENSSLCNF_MIN_PROTOCOL_SSLV3
  language: openssl-cnf
  category: weak-tls
  severity: critical
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  detector:
    type: regex
    pattern: '^\s*MinProtocol\s*=\s*SSLv3\b'
    flags: i
  message: "openssl.cnf MinProtocol pins SSLv3 — POODLE-vulnerable and removed from every modern OpenSSL build."
  recommendation: "Set MinProtocol = TLSv1.2 (or TLSv1.3) in [system_default_sect]."
  references:
    - "https://datatracker.ietf.org/doc/html/rfc7568"
  cwe: [327, 326]
  confidence: 0.99
  examples:
    match:
      - 'MinProtocol = SSLv3'
    no_match:
      - 'MinProtocol = TLSv1.3'
- id: OPENSSLCNF_MIN_PROTOCOL_TLSV1
  language: openssl-cnf
  category: weak-tls
  severity: high
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["openssl.cnf", "*.openssl.cnf", "openssl-*.cnf", "*.cnf"]
  detector:
    type: regex
    pattern: '^\s*MinProtocol\s*=\s*TLSv1(?:\.0)?\s*$'
    flags: i
  message: "openssl.cnf MinProtocol pins TLSv1.0 — deprecated by RFC 8996."
  recommendation: "Set MinProtocol = TLSv1.2 minimum; prefer TLSv1.3."
  references:
    - "https://datatracker.ietf.org/doc/html/rfc8996"
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'MinProtocol = TLSv1'
    no_match:
      - 'MinProtocol = TLSv1.2'
