    flags: i
  message: "openssl.cnf MinProtocol = TLSv1.2 — current acceptable minimum but flagged for PQC inventory (TLS 1.3 is required for the hybrid PQC handshake extensions)."
  recommendation: "Migrate to MinProtocol = TLSv1.3 once the client population permits, so the path is open to hybrid PQC key exchange (e.g. X25519MLKEM768)."
  cwe: [326]
