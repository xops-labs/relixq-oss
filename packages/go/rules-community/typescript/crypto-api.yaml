# JWT algorithm identifiers (jsonwebtoken / jose / fast-jwt option objects).
- id: TS_JWT_ALG_RSA
  language: typescript
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "RSA"
  usage_type: "signing"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: 'algorithm\s*:\s*[''"](RS|PS)(256|384|512)[''"]'
  message: "JWT signing algorithm RS*/PS* - RSA-based JWT signatures are quantum-vulnerable (Shor's algorithm)."
  recommendation: "Migrate JWT signing to ML-DSA (FIPS 204) as library support lands; inventory and plan key rotation now."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'const token = jwt.sign(payload, privateKey, { algorithm: ''PS384'' });'
    no_match:
      - 'const token = jwt.sign(payload, secret, { algorithm: ''HS512'' });'

