#
# crypto-api DETECTION layer (OSS / community tree). These rules fire on
# quantum-vulnerable cryptographic primitives so the free scanner sees the
# threat surface it is named for. Regex is the recall floor; AST runners
# restore precision where available. The migration-enrichment layer (NIST/FIPS
# substitutions, vertical context, references) is supplied by an optional external rule-pack overlay
# under the same id and is overlaid at report time by package enrich.

# generateKeyPair / generateKeyPairSync dispatch on the first string argument
# so each finding carries the correct algorithm (the old single RSA rule fired
# on every key type, mislabeling 'ec' keygen as RSA).
- id: TS_NODE_CRYPTO_RSA
  language: typescript
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "RSA"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: '\bgenerateKeyPair(Sync)?\s*\(\s*[''"]rsa(-pss)?[''"]'
  message: "Node crypto generateKeyPair(Sync) with 'rsa'/'rsa-pss' - RSA is quantum-vulnerable (Shor's algorithm)."
  recommendation: "Migrate signatures to ML-DSA (FIPS 204) and key establishment to ML-KEM (FIPS 203) or hybrid X25519MLKEM768."
  cwe: [327]
  confidence: 0.95
  examples:
    match:
      - 'const { publicKey, privateKey } = crypto.generateKeyPairSync(''rsa'', { modulusLength: 2048 });'
    no_match:
      - 'crypto.generateKeyPairSync(''ec'', { namedCurve: ''P-256'' });'

