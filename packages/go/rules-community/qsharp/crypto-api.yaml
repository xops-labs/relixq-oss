- id: QSHARP_HARDCODED_PUBLIC_EXPONENT
  language: qsharp
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "RSA"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?i)(?:let|mutable)\\s+(?:exponent|publicExponent|e)\\s*(?::\\s*(?:Int|BigInt))?\\s*=\\s*(?:3|65537)\\b"
  message: "Hardcoded RSA public exponent literal in Q# — review padding scheme."
  cwe: [327]
  confidence: 0.6

- id: QSHARP_SHOR_INVOCATION
  language: qsharp
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "Shor"
  usage_type: "quantum_attack_research"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?i)\\b(?:Shor|PeriodFinding|EstimateFrequency|EstimateOverlapBetweenStates|QuantumPhaseEstimation)\\s*\\("
  message: "Shor / period-finding / phase-estimation invocation in Q# — research surface for quantum attacks on classical crypto."
  confidence: 0.55

- id: QSHARP_GROVER_INVOCATION
  language: qsharp
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "Grover"
  usage_type: "quantum_attack_research"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?i)\\b(?:GroversAlgorithm|GroverSearch|AmplitudeAmplification)\\s*\\("
