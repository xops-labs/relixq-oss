- id: QSHARP_UNAUTH_MEASUREMENT_RESULT
  language: qsharp
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "HMAC"
  usage_type: "mac"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?i)\\b(?:let|mutable)\\s+\\w+\\s*(?::\\s*[\\w<>,\\s]+)?\\s*=\\s*M(?:ResetZ|ResetX|ResetY|Reset)?\\s*\\("
  message: "Quantum measurement result bound to local variable — confirm classical post-processing authenticates the result before exposing it (HMAC-SHA256 or AES-GCM on the host)."
  cwe: [345, 353]
  confidence: 0.4
