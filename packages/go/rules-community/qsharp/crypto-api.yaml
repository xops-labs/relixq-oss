#
# crypto-api DETECTION layer (OSS / community tree). These rules fire on
# quantum-vulnerable cryptographic primitives so the free scanner sees the
# threat surface it is named for. Regex is the recall floor; AST runners
# restore precision where available. The migration-enrichment layer (NIST/FIPS
# substitutions, vertical context, references) is supplied by an optional external rule-pack overlay
# under the same id and is overlaid at report time by package enrich.

- id: QSHARP_OPEN_CLASSICAL_CRYPTO
  language: qsharp
  category: crypto-api
  layer: detection
  severity: medium
  algorithm: "ClassicalCrypto"
  usage_type: "dependency"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?m)^\\s*open\\s+Microsoft\\.Quantum\\.Crypto(?:\\.[A-Za-z0-9_]+)*\\s*;"
  message: "`open Microsoft.Quantum.Crypto.*` — Q# classical-crypto namespace imported; review for production exposure."
  cwe: [327]
  confidence: 0.7

- id: QSHARP_OPEN_DOTNET_RSA
  language: qsharp
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "dependency"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "(?m)^\\s*open\\s+System\\.Security\\.Cryptography(?:\\.[A-Za-z0-9_]+)*\\s*;"
  message: "`open System.Security.Cryptography.*` from Q# — classical BCL crypto bridged into quantum code."
  cwe: [327]
  confidence: 0.85

- id: QSHARP_HARDCODED_RSA_KEYSIZE_1024
  language: qsharp
  category: crypto-api
  layer: detection
  severity: critical
  algorithm: "RSA"
  usage_type: "key_generation"
  quantum_safety: vulnerable
  key_size: 1024
  detector:
    type: regex
    pattern: "(?i)(?:let|mutable)\\s+(?:keySize|modulus|rsaSize|nBits|keyBits)\\s*(?::\\s*(?:Int|BigInt|Long))?\\s*=\\s*1024\\b"
  message: "Hardcoded 1024-bit RSA key parameter in Q# — below NIST 2030 floor and quantum-vulnerable."
  cwe: [326, 327]
  confidence: 0.85

- id: QSHARP_HARDCODED_RSA_KEYSIZE_2048
  language: qsharp
  category: crypto-api
  layer: detection
  severity: high
  algorithm: "RSA"
  usage_type: "key_generation"
  quantum_safety: vulnerable
