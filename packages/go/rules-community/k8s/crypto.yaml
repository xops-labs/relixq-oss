- id: K8S_CERTMANAGER_ECDSA_WEAK_CURVE
  language: yaml
  category: weak-key-size
  severity: high
  algorithm: ECDSA
  usage_type: key_generation
  quantum_safety: vulnerable
  key_size: 224
  file_globs: ["*.yaml", "*.yml"]
  detector:
    type: regex
    pattern: '^\s*size:\s*224\b'
  message: "cert-manager Issuer/ClusterIssuer uses ECDSA P-224 (below modern minimums)."
  recommendation: "Use ECDSA P-256 or P-384 (size: 256 / 384)."
