#
# Kubernetes crypto rule pack.
# All rules are regex over YAML manifests. Routing is via `language: yaml` +
# basename-style file_globs. The current loader uses filepath.Match which does
# not support `**`, so globs must be basename patterns.
# Content disambiguation between K8s / Helm / Ansible relies on the regex
# patterns themselves (apiVersion strings, module names, Sprig calls).
- id: K8S_CERTMANAGER_RSA_1024
  language: yaml
  category: weak-key-size
  severity: critical
  algorithm: RSA
  usage_type: key_generation
  quantum_safety: vulnerable
  key_size: 1024
  file_globs: ["*.yaml", "*.yml"]
  detector:
    type: regex
    pattern: '^\s*size:\s*1024\b'
  message: "cert-manager Issuer/ClusterIssuer mints an RSA key at 1024 bits."
  recommendation: "Raise privateKey.size to 3072+ for short-lived certs or 4096 for long-lived; track PQC migration to ML-DSA when cert-manager adds support."
  references:
    - "https://cert-manager.io/docs/configuration/issuers/"
  cwe: [326]
  confidence: 0.6
- id: K8S_CERTMANAGER_RSA_2048
  language: yaml
  category: weak-key-size
  severity: medium
  algorithm: RSA
  usage_type: key_generation
  quantum_safety: vulnerable
  key_size: 2048
  file_globs: ["*.yaml", "*.yml"]
  detector:
    type: regex
    pattern: '^\s*size:\s*2048\b'
  message: "cert-manager Issuer/ClusterIssuer mints an RSA-2048 key (below the 3072-bit modern minimum)."
  recommendation: "Use size: 3072 or 4096; plan PQC hybrid issuance once supported."
  references:
