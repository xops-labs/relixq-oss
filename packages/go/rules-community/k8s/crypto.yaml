- id: K8S_SERVICEMONITOR_INSECURE_SKIP_VERIFY
  language: yaml
  category: weak-tls
  severity: high
  algorithm: TLS
  usage_type: tls_config
  quantum_safety: vulnerable
  file_globs: ["*.yaml", "*.yml"]
  detector:
    type: regex
    pattern: '^\s*insecureSkipVerify:\s*true\b'
  message: "Prometheus ServiceMonitor (or generic tlsConfig) disables TLS verification."
  recommendation: "Provide a caFile / caSecret reference and remove insecureSkipVerify."
