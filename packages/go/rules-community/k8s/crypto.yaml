- id: K8S_GATEKEEPER_WEAK_HASH_REF
  language: yaml
  category: weak-hash
  severity: medium
  algorithm: SHA1
  usage_type: signing
  quantum_safety: classically_broken
  file_globs: ["*.yaml", "*.yml"]
  detector:
    type: regex
    pattern: '^\s*(bundle|policy|constraint)[A-Za-z]*Sha1\s*:'
    flags: i
  message: "OPA Gatekeeper / policy bundle references a SHA-1 hash."
  recommendation: "Sign and verify bundles with SHA-256 (or stronger)."
  cwe: [328]
  confidence: 0.6
