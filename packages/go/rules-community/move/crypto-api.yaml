- id: MOVE_BCS_TO_BYTES_SIGNATURE
  language: move
  category: crypto-api
  layer: detection
  severity: info
  algorithm: "BCS"
  usage_type: "serialization"
  quantum_safety: vulnerable
  detector:
    type: regex
    pattern: "bcs::to_bytes\\s*\\(\\s*&?\\s*(?:[A-Za-z_][A-Za-z0-9_]*\\.)?(?:signature|sig|pubkey|public_key|priv_key|private_key|secret_key|key)\\b"
  message: "bcs::to_bytes(&signature/pubkey/key) — BCS-serializing signature/key material; data-flow hint for the PQC inventory."
  confidence: 0.5
