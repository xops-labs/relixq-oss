# Perl crypto rules
#
# Perl runs long-running production infrastructure — telecom billing, ETL
# pipelines, ops tooling, legacy CGI. Crypto surface is the CPAN module
# constellation:
#   - Digest::*        — MD5, SHA1, SHA, MD2 hashing modules
#   - Crypt::*         — DES, DES_EDE3, RC4, Blowfish, CBC wrappers, RSA
#   - Net::SSL         — old SSL stack, superseded by IO::Socket::SSL
#   - Net::SSLeay      — direct OpenSSL bindings (informational)
#   - IO::Socket::SSL  — modern TLS stack (flag deprecated versions / verify-off)
#   - LWP::UserAgent   — HTTP client with ssl_opts knobs
#
# Perl has NO first-class PQC ecosystem as of mid-2026. Migrators have to wrap
# liboqs via XS or Inline::C, or shell out to an OpenSSL 3.x build with the OQS
# provider. Flag the gap loudly — large Perl shops will need vendor
# support before they migrate.
#
# Strategy: regex-only. No AST runner is created for Perl; the smacker
# tree-sitter module pinned in go.mod does not ship a Perl subpackage.
# Regex-only is acceptable for deferred-tier
# languages. The rule IDs and message text are framed so a future AST upgrade
# (`call:Module::sub`, `use:Module`) would be a clean refactor.

# ---------------------------------------------------------------------------
# `use Module` — dependency-surface signals (broken/weak hashing modules)
# ---------------------------------------------------------------------------
- id: PERL_USE_DIGEST_MD5
  language: perl
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: dependency
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: 'use\s+Digest::MD5\b'
  message: "use Digest::MD5 — MD5 is cryptographically broken (collisions since 2004)."
  recommendation: "Switch to Digest::SHA (SHA-256/SHA-3) for non-password hashing; for passwords use Crypt::Argon2 (Argon2id)."
  cwe: [327, 328]
  confidence: 0.95
- id: PERL_USE_DIGEST_SHA1
  language: perl
  category: weak-hash
  severity: high
  algorithm: SHA1
  usage_type: dependency
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: 'use\s+Digest::SHA1\b'
  message: "use Digest::SHA1 — SHA-1 is cryptographically broken (SHAttered, 2017)."
  recommendation: "Switch to Digest::SHA with sha256/sha3_256; for HMAC use Digest::SHA hmac_sha256."
  cwe: [328]
  confidence: 0.93
- id: PERL_USE_DIGEST_MD2
  language: perl
  category: weak-hash
  severity: high
  algorithm: MD2
  usage_type: dependency
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: 'use\s+Digest::MD2\b'
  message: "use Digest::MD2 — MD2 is obsolete and cryptographically broken (preimage attacks since 2009)."
  recommendation: "Replace with Digest::SHA (SHA-256 minimum). MD2 has no legitimate modern use."
  cwe: [327, 328]
  confidence: 0.95
# ---------------------------------------------------------------------------
# `use Module` — broken / weak symmetric ciphers
# ---------------------------------------------------------------------------
- id: PERL_USE_CRYPT_DES
  language: perl
  category: weak-cipher
  severity: high
  algorithm: DES
  usage_type: dependency
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: 'use\s+Crypt::DES\b'
  message: "use Crypt::DES — single-DES has a 56-bit effective key and is brute-forceable."
  recommendation: "Use Crypt::CBC with AES-256 (Crypt::Cipher::AES) or libsodium via Crypt::NaCl::Sodium."
  cwe: [327]
  confidence: 0.95
- id: PERL_USE_CRYPT_DES_EDE3
  language: perl
  category: weak-cipher
  severity: high
  algorithm: 3DES
  usage_type: dependency
  quantum_safety: grover_weakened
  detector:
    type: regex
    pattern: 'use\s+Crypt::DES_EDE3\b'
  message: "use Crypt::DES_EDE3 — Triple-DES is deprecated by NIST SP 800-131A (disallowed after 2023)."
  recommendation: "Migrate to AES-256-GCM (Crypt::Mode::GCM with Crypt::Cipher::AES) or ChaCha20-Poly1305."
  cwe: [327]
  confidence: 0.95
- id: PERL_USE_CRYPT_RC4
  language: perl
  category: weak-cipher
  severity: high
  algorithm: RC4
  usage_type: dependency
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: 'use\s+Crypt::RC4\b'
  message: "use Crypt::RC4 — RC4 is prohibited by RFC 7465 (biases recoverable in practice)."
  recommendation: "Switch to AES-256-GCM (Crypt::Mode::GCM) or ChaCha20-Poly1305 via Crypt::NaCl::Sodium."
  cwe: [327]
  confidence: 0.95
- id: PERL_USE_CRYPT_BLOWFISH
  language: perl
  category: weak-cipher
  severity: medium
  algorithm: Blowfish
  usage_type: dependency
  quantum_safety: grover_weakened
  detector:
    type: regex
    pattern: 'use\s+Crypt::Blowfish\b'
  message: "use Crypt::Blowfish — 64-bit block size; vulnerable to SWEET32-style birthday attacks beyond a few GB."
  recommendation: "Switch to AES-256-GCM (Crypt::Mode::GCM) for 128-bit block size and authenticated encryption."
  cwe: [327]
  confidence: 0.9
# ---------------------------------------------------------------------------
# Direct call-site rules — broken hash functions
# ---------------------------------------------------------------------------
- id: PERL_DIGEST_MD5_HEX
  language: perl
  category: weak-hash
  severity: high
  algorithm: MD5
  usage_type: hashing
  quantum_safety: classically_broken
  # Matches Digest::MD5::md5, ::md5_hex, ::md5_base64. The
  # `(?:_hex|_base64)?` arm keeps a single rule for the three variants.
  detector:
    type: regex
    pattern: 'Digest::MD5::md5(?:_hex|_base64)?\s*\('
  message: "Digest::MD5::md5* — direct MD5 invocation; MD5 is cryptographically broken."
  recommendation: "Use Digest::SHA::sha256_hex (or sha3_256_hex); for passwords use Crypt::Argon2."
  cwe: [328]
  confidence: 0.95
- id: PERL_DIGEST_SHA1_HEX
  language: perl
  category: weak-hash
  severity: high
  algorithm: SHA1
  usage_type: hashing
  quantum_safety: classically_broken
  detector:
    type: regex
    pattern: 'Digest::SHA1::sha1(?:_hex|_base64)?\s*\('
  message: "Digest::SHA1::sha1* — direct SHA-1 invocation; SHA-1 is cryptographically broken."
  recommendation: "Use Digest::SHA::sha256_hex or sha3_256_hex."
  cwe: [328]
  confidence: 0.93
# ---------------------------------------------------------------------------
# Constructor-discriminating regex rules
# ---------------------------------------------------------------------------
- id: PERL_CRYPT_CBC_WEAK_CIPHER
  language: perl
  category: weak-cipher
  severity: high
  algorithm: DES
  usage_type: encryption
  quantum_safety: classically_broken
  # Discriminates Crypt::CBC->new(... -cipher => "DES"|"RC4"|"Blowfish" ...).
  # Captures the broken/weak cipher being plugged into CBC. The character
  # class within the lookahead keeps RE2 happy (no backrefs needed).
  detector:
    type: regex
    pattern: 'Crypt::CBC->new\s*\(\s*[^)]*-cipher\s*=>\s*[''"](DES|RC4|Blowfish)[''"]'
  message: "Crypt::CBC->new(-cipher => 'DES|RC4|Blowfish') — CBC mode wrapping a broken/weak primitive."
  recommendation: "Replace cipher with AES (Crypt::Cipher::AES) and move to Crypt::Mode::GCM for AEAD."
  cwe: [327]
  confidence: 0.95
# ---------------------------------------------------------------------------
# TLS configuration — IO::Socket::SSL knobs
# ---------------------------------------------------------------------------
- id: PERL_SSL_OLD_VERSION
  language: perl
  category: weak-protocol
  severity: high
  algorithm: TLS
  usage_type: tls_configuration
  quantum_safety: vulnerable
  # Matches the deprecated-version literal on its own line. Argument lists
  # typically span multiple lines in real Perl (IO::Socket::SSL->new(\n  ...\n)),
  # so we match the SSL_version key+value as a unit rather than requiring the
  # constructor call on the same line. Tolerates either single or double
  # quotes around the version literal.
  detector:
    type: regex
    pattern: 'SSL_version\s*=>\s*[''"](?:SSLv3|TLSv1|TLSv1\.1)[''"]'
  message: "IO::Socket::SSL(SSL_version => 'SSLv3|TLSv1|TLSv1.1') — deprecated TLS version (RFC 8996)."
  recommendation: "Pin SSL_version => 'TLSv1_2' or 'TLSv1_3'; prefer TLS 1.3 with hybrid PQC where supported."
  cwe: [327, 326]
  confidence: 0.95
- id: PERL_SSL_VERIFY_NONE
  language: perl
  category: cert-validation
  severity: critical
  algorithm: X509
  usage_type: tls_configuration
  quantum_safety: vulnerable
  # Matches the SSL_verify_mode key+value on a single line. The literal `0`
  # is the documented Net::SSLeay constant value for SSL_VERIFY_NONE;
  # matching both spellings catches both idioms. Per-line scoping is fine
  # here — production hits set the key explicitly.
  detector:
    type: regex
    pattern: 'SSL_verify_mode\s*=>\s*(?:0\b|SSL_VERIFY_NONE\b)'
  message: "IO::Socket::SSL(SSL_verify_mode => 0|SSL_VERIFY_NONE) — disables peer certificate verification."
  recommendation: "Set SSL_verify_mode => SSL_VERIFY_PEER and pin SSL_ca_file/SSL_ca_path; never disable cert checks in production."
  cwe: [295]
  confidence: 0.95
- id: PERL_LWP_VERIFY_HOSTNAME_OFF
  language: perl
  category: cert-validation
  severity: critical
  algorithm: X509
  usage_type: tls_configuration
  quantum_safety: vulnerable
  # Matches the `verify_hostname => 0` literal on a single line. LWP and
  # Furl both honor this key inside an ssl_opts hashref; restricting the
  # match to the key+value pair keeps the rule robust to multi-line
  # constructor formatting common in production Perl.
  detector:
    type: regex
    pattern: 'verify_hostname\s*=>\s*0\b'
  message: "LWP::UserAgent(ssl_opts => { verify_hostname => 0 }) — disables hostname verification (MITM vector)."
  recommendation: "Remove the override; the default verify_hostname => 1 is correct for production HTTPS clients."
  cwe: [295, 297]
  confidence: 0.95
# ---------------------------------------------------------------------------
# PRNG — Perl's rand() is not a CSPRNG
# ---------------------------------------------------------------------------
- id: PERL_NON_CSPRNG_RAND_FOR_KEYS
  language: perl
  category: weak-prng
  severity: high
  algorithm: rand
  usage_type: random
  quantum_safety: vulnerable
  # Heuristic: a call to rand() on a line that mentions a crypto-sensitive
  # variable name. Perl's rand() is a Mersenne-Twister-style non-CSPRNG and
  # must never be used for key/nonce/IV/secret generation. The alternation
  # arms match either order (rand on the left of the keyword, or vice versa)
  # using a single per-line regex without backreferences.
  detector:
    type: regex
    flags: i
    pattern: '(?:\brand\s*\([^)]*\)[^\n]*(?:key|nonce|iv|secret|token|password)|(?:key|nonce|iv|secret|token|password)[^\n]*\brand\s*\([^)]*\))'
  message: "rand() used in a key/nonce/IV/secret context — Perl's rand() is not a CSPRNG."
  recommendation: "Use Crypt::URandom::urandom (reads /dev/urandom) or Bytes::Random::Secure::random_bytes."
  cwe: [338, 330]
  confidence: 0.75
